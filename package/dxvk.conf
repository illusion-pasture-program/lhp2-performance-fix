# DXVK config for LEGO Harry Potter Years 5-7

# 0 = uncapped. Set this to your monitor refresh rate if desired.
d3d9.maxFrameRate = 0

# Keep latency low.
dxvk.maxFrameLatency = 1

# Safe visual upgrade for old DX9 texture filtering.
d3d9.samplerAnisotropy = 16

# Uncomment for troubleshooting.
# dxvk.hud = fps,frametimes
